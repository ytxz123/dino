dataset:
  train_images: data/train/images
  train_masks: data/train/masks
  val_images: data/val/images
  val_masks: data/val/masks
  image_size: 512
  label_divisor: 50
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

backbone:
  weights_path: checkpoints/dinov3_vitl16_pretrain_sat493m-eadcf0ff.pth
  out_layers: LAST
  autocast_dtype: bfloat16
  check_hash: false

head:
  num_classes: 3
  dropout: 0.1
  use_batchnorm: false

optimizer:
  lr: 3.0e-4
  beta1: 0.9
  beta2: 0.999
  weight_decay: 0.01
  grad_clip: 1.0

scheduler:
  name: WarmupOneCycleLR
  warmup_iters: 500
  pct_start: 0.1
  div_factor: 25.0
  final_div_factor: 1000.0

train:
  epochs: 20
  batch_size: 4
  accumulation_steps: 4
  num_workers: 4
  hflip_prob: 0.5
  ce_weight: 1.0
  dice_weight: 0.0
  eval_interval: 1
  save_every: 1
  log_interval: 50
  resume_from: ""

eval:
  batch_size: 4
  num_workers: 4
  checkpoint_path: outputs/three_class_segmentation/best.pth

runtime:
  output_dir: outputs/three_class_segmentation
  device: cuda
  seed: 3407
  pin_memory: true